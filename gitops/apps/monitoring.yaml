apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 69.8.2
    helm:
      values: |
        grafana:
          service:
            type: NodePort
            nodePort: 30300
          nodeSelector:
            kubernetes.io/hostname: ubuntu-server-3
          adminPassword: admin
        prometheus:
          service:
            type: NodePort
            nodePort: 30090
          prometheusSpec:
            nodeSelector:
              kubernetes.io/hostname: ubuntu-server-3
        alertmanager:
          alertmanagerSpec:
            nodeSelector:
              kubernetes.io/hostname: ubuntu-server-3
        kube-state-metrics:
          nodeSelector:
            kubernetes.io/hostname: ubuntu-server-3
        prometheus-node-exporter:
          nodeSelector:
            kubernetes.io/hostname: ubuntu-server-3
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
