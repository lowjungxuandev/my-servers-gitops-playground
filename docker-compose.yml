services:
  cluster-node:
    image: ubuntu:latest
    container_name: cluster-node
    hostname: cluster-node
    privileged: true
    command: ["/bin/bash", "-lc", "while true; do sleep 3600; done"]
    tty: true
    stdin_open: true
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - ./cluster-node:/srv/server
      - /lib/modules:/lib/modules:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    ports:
      - "6443:6443"
      - "8080:30080"
      - "3000:30300"
      - "9090:30090"
      - "8081:30081"

  application-node:
    image: ubuntu:latest
    container_name: application-node
    hostname: application-node
    privileged: true
    command: ["/bin/bash", "-lc", "while true; do sleep 3600; done"]
    tty: true
    stdin_open: true
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - ./application-node:/srv/server
      - /lib/modules:/lib/modules:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

  infrastructure-node:
    image: ubuntu:latest
    container_name: infrastructure-node
    hostname: infrastructure-node
    privileged: true
    command: ["/bin/bash", "-lc", "while true; do sleep 3600; done"]
    tty: true
    stdin_open: true
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - ./infrastructure-node:/srv/server
      - /lib/modules:/lib/modules:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
